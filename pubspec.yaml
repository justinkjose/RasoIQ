name: rasoiq
description: Smart grocery list and pantry management app.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  google_fonts: ^8.0.2
  google_mlkit_text_recognition: ^0.15.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  camera: ^0.12.0
  image_picker: ^1.0.7
  shared_preferences: ^2.2.2
  speech_to_text: ^7.3.0
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.2.0
  provider: ^6.1.2
  share_plus: ^10.0.2
  table_calendar: ^3.1.2
  file_picker: ^8.0.3
  flutter_whisper_kit: ^0.3.0
  whisper4dart: ^0.1.5
  firebase_core: ^4.5.0
  firebase_analytics: ^12.1.3
  firebase_messaging: ^16.1.2
  cloud_firestore: ^6.1.3
  firebase_auth: ^6.2.0
  path_provider: ^2.1.4
  archive: ^3.4.10
  google_mlkit_barcode_scanning: ^0.14.2
  connectivity_plus: ^6.0.5
  app_links: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/recipes.json
    - assets/whisper/ggml-tiny.en.bin
